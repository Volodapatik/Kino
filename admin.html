<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.W.A.T. Admin Panel</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff41; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .terminal { background-color: #050505; border: 2px solid #00ff41; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); padding: 30px; border-radius: 5px; width: 100%; max-width: 500px; }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 255, 65, 0.5); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; background-color: #111; border: 1px solid #00ff41; color: #00ff41; border-radius: 4px; box-sizing: border-box; font-family: inherit; font-size: 1rem; }
        input:focus, select:focus { outline: none; box-shadow: 0 0 10px rgba(0, 255, 65, 0.5); }
        button { width: 100%; padding: 15px; background-color: #00ff41; border: none; color: #000; font-weight: bold; font-size: 1.1rem; border-radius: 4px; cursor: pointer; text-transform: uppercase; transition: all 0.3s ease; font-family: inherit; margin-top: 10px; }
        button:hover { background-color: #003300; color: #00ff41; box-shadow: 0 0 15px #00ff41; }
        .status { margin-top: 20px; text-align: center; font-size: 0.95rem; min-height: 24px; font-weight: bold; }
        .hidden { display: none; }
        .setup-link { color: #ffff00; text-decoration: underline; cursor: pointer; display: block; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="terminal">
    <h1>S.W.A.T. Command Center</h1>
    
    <!-- БЛОК ВХОДУ -->
    <div id="login-block">
        <div class="form-group">
            <label for="admin-password">Пароль адміна:</label>
            <input type="password" id="admin-password" placeholder="Введіть код доступу..." onkeydown="if(event.key==='Enter') login()">
        </div>
        <button onclick="login()">Увійти в систему</button>
    </div>

    <!-- БЛОК АКТИВАЦІЇ REFRESH TOKEN (ПЕРШИЙ ЗАПУСК) -->
    <div id="setup-block" class="hidden">
        <p style="color: #ffff00; font-size: 0.9rem; text-align: center;">Необхідно виконати прив'язку до Dropbox:</p>
        <div class="form-group">
            <label for="auth-code">Введіть тимчасовий код (s0_...):</label>
            <input type="text" id="auth-code" placeholder="Вставте отриманий код сюди">
        </div>
        <button onclick="generatePermanentToken()">Активувати вічний доступ</button>
        <a id="dropbox-link" class="setup-link" target="_blank">1. Натисніть сюди, щоб отримати код</a>
    </div>

    <!-- БЛОК КЕРУВАННЯ ПЛЕЄРОМ -->
    <div id="control-block" class="hidden">
        <div class="form-group">
            <label for="movie-title">Назва фільму / серії:</label>
            <input type="text" id="movie-title" placeholder="Наприклад: Хижак 2 (1990)">
        </div>
        <div class="form-group">
            <label for="movie-url">Посилання на відео (MP4 / M3U8):</label>
            <input type="text" id="movie-url" placeholder="https://...">
        </div>
        <div class="form-group">
            <label for="movie-status">Статус системи:</label>
            <select id="movie-status">
                <option value="ONLINE">ONLINE</option>
                <option value="OFFLINE">OFFLINE</option>
            </select>
        </div>
        <button onclick="updateDatabase()">Оновити плеєр</button>
        <span class="setup-link" onclick="resetToken()">Переприв'язати Dropbox</span>
    </div>

    <div class="status" id="status-msg">SYSTEM ACCESS REQUIRED</div>
</div>

<script>
    const CLIENT_ID = "31ebl842bq4ci0v";
    const CLIENT_SECRET = "1agw2hgtzur90as";

    // Генеруємо посилання для авторизації
    document.getElementById('dropbox-link').href = `https://www.dropbox.com/oauth2/authorize?client_id=${CLIENT_ID}&token_access_type=offline&response_type=code`;

    function login() {
        const password = document.getElementById('admin-password').value;
        const statusMsg = document.getElementById('status-msg');

        if (password === "1w2q789rs") {
            document.getElementById('login-block').classList.add('hidden');
            
            // Перевіряємо, чи є вже збережений вічний токен в браузері
            if (!localStorage.getItem('dropbox_refresh_token')) {
                document.getElementById('setup-block').classList.remove('hidden');
                statusMsg.innerText = "Потрібна первинна авторизація Dropbox.";
                statusMsg.style.color = "#ffff00";
            } else {
                document.getElementById('control-block').classList.remove('hidden');
                statusMsg.innerText = "З'єднання встановлено.";
                statusMsg.style.color = "#00ff41";
            }
        } else {
            statusMsg.innerText = "ACCESS DENIED: Невірний пароль";
            statusMsg.style.color = "red";
        }
    }

    async function generatePermanentToken() {
        const code = document.getElementById('auth-code').value.trim();
        const statusMsg = document.getElementById('status-msg');

        if (!code) {
            statusMsg.innerText = "Введіть отриманий код!";
            return;
        }

        statusMsg.innerText = "Обмін коду на вічний токен...";
        statusMsg.style.color = "yellow";

        try {
            const response = await fetch('https://api.dropboxapi.com/oauth2/token', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    grant_type: 'authorization_code',
                    code: code,
                    client_id: CLIENT_ID,
                    client_secret: CLIENT_SECRET
                })
            });

            const data = await response.json();

            if (data.refresh_token) {
                // Зберігаємо вічний токен прямо у пам'ять браузера, щоб він ніколи не злітав
                localStorage.setItem('dropbox_refresh_token', data.refresh_token);
                
                document.getElementById('setup-block').classList.add('hidden');
                document.getElementById('control-block').classList.remove('hidden');
                statusMsg.innerText = "Успішно прив'язано! Можна оновлювати фільми.";
                statusMsg.style.color = "#00ff41";
            } else {
                statusMsg.innerText = "Помилка: код застарів. Спробуйте ще раз.";
                statusMsg.style.color = "red";
            }
        } catch (e) {
            statusMsg.innerText = "Помилка запиту під час активації.";
            statusMsg.style.color = "red";
        }
    }

    async function getAccessToken() {
        const refreshToken = localStorage.getItem('dropbox_refresh_token');
        const response = await fetch('https://api.dropboxapi.com/oauth2/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                grant_type: 'refresh_token',
                refresh_token: refreshToken,
                client_id: CLIENT_ID,
                client_secret: CLIENT_SECRET
            })
        });
        const data = await response.json();
        return data.access_token;
    }

    async function updateDatabase() {
        const title = document.getElementById('movie-title').value;
        const url = document.getElementById('movie-url').value;
        const status = document.getElementById('movie-status').value;
        const statusMsg = document.getElementById('status-msg');

        if (!title || !url) {
            statusMsg.innerText = "Заповніть усі поля!";
            statusMsg.style.color = "red";
            return;
        }

        statusMsg.innerText = "Синхронізація з Dropbox...";
        statusMsg.style.color = "yellow";

        const newData = { "movies": [{ "id": 1, "title": title, "url": url, "status": status }] };

        try {
            const accessToken = await getAccessToken();

            const response = await fetch('https://content.dropboxapi.com/2/files/upload', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + accessToken,
                    'Dropbox-API-Arg': JSON.stringify({ path: '/db.json', mode: 'overwrite' }),
                    'Content-Type': 'application/octet-stream'
                },
                body: JSON.stringify(newData, null, 2)
            });

            if (response.ok) {
                statusMsg.innerText = "СИСТЕМУ ОНОВЛЕНО УСПІШНО!";
                statusMsg.style.color = "#00ff41";
            } else {
                statusMsg.innerText = "Dropbox відхилив запис файла.";
                statusMsg.style.color = "red";
            }
        } catch (error) {
            statusMsg.innerText = "Помилка з'єднання.";
            statusMsg.style.color = "red";
        }
    }

    function resetToken() {
        localStorage.removeItem('dropbox_refresh_token');
        location.reload();
    }
</script>
</body>
</html>
