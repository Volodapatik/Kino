<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.W.A.T. — Admin Control Panel</title>
    <style>
        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Consolas', monospace;
            color: #00ff41;
        }
        .admin-box {
            width: 90%;
            max-width: 500px;
            background: #111;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            border: 1px solid #222;
        }
        h2 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 18px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        input, select {
            width: 100%;
            padding: 10px;
            background: #000;
            border: 1px solid #333;
            color: #00ff41;
            font-family: 'Consolas', monospace;
            border-radius: 6px;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #00ff41;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #00ff41;
            color: #000;
            border: none;
            font-family: 'Consolas', monospace;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 6px;
            margin-top: 10px;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.4);
        }
        button:hover {
            background: #00dd37;
        }
        #status-msg {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
        }
        .hidden {
            display: none;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

<div class="admin-box">
    <div id="login-block">
        <h2>System Access Required</h2>
        <div class="form-group">
            <label>Пароль Адміна:</label>
            <input type="password" id="admin-password" placeholder="Введіть пароль...">
        </div>
        <button onclick="login()">Увійти в систему</button>
    </div>

    <div id="control-block" class="hidden">
        <h2>S.W.A.T. Command Center</h2>
        
        <div class="form-group">
            <label>Назва фільму / серії:</label>
            <input type="text" id="movie-title" placeholder="Наприклад: S.W.A.T. Сезон 1 Серія 1">
        </div>

        <div class="form-group">
            <label>Посилання на відео (mp4 / пряме):</label>
            <input type="text" id="movie-url" placeholder="https://site.com/video.mp4">
        </div>

        <div class="form-group">
            <label>Статус системи:</label>
            <select id="movie-status">
                <option value="ONLINE">ONLINE</option>
                <option value="OFFLINE">OFFLINE</option>
                <option value="MAINTENANCE">MAINTENANCE</option>
            </select>
        </div>

        <button onclick="updateDatabase()">Оновити плеєр</button>
    </div>

    <div id="status-msg"></div>
</div>

<script>

    let decryptedToken = "";

    function login() {
        const password = document.getElementById('admin-password').value;
        const statusMsg = document.getElementById('status-msg');

        if (!password) {
            statusMsg.innerText = "Помилка: Введіть пароль";
            statusMsg.style.color = "red";
            return;
        }

        try {
            const bytes = CryptoJS.AES.decrypt(ENCRYPTED_DROPBOX_TOKEN, password);
            decryptedToken = bytes.toString(CryptoJS.enc.Utf8);

            if (!decryptedToken || decryptedToken.length < 10) {
                throw new Error("Wrong password");
            }

            document.getElementById('login-block').classList.add('hidden');
            document.getElementById('control-block').classList.remove('hidden');
            statusMsg.innerText = "Доступ дозволено. З'єднання встановлено.";
            statusMsg.style.color = "#00ff41";

        } catch (e) {
            statusMsg.innerText = "ACCESS DENIED: Невірний пароль";
            statusMsg.style.color = "red";
        }
    }

    async function updateDatabase() {
        const title = document.getElementById('movie-title').value;
        const url = document.getElementById('movie-url').value;
        const status = document.getElementById('movie-status').value;
        const statusMsg = document.getElementById('status-msg');

        if (!title || !url) {
            statusMsg.innerText = "Заповніть усі поля!";
            statusMsg.style.color = "red";
            return;
        }

        statusMsg.innerText = "Оновлення бази даних Dropbox...";
        statusMsg.style.color = "yellow";

        const newData = {
            "movies": [
                {
                    "id": 1,
                    "title": title,
                    "url": url,
                    "status": status
                }
            ]
        };

        try {
            const response = await fetch('https://content.dropboxapi.com/2/files/upload', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + decryptedToken,
                    'Dropbox-API-Arg': JSON.stringify({
                        path: '/db.json',
                        mode: 'overwrite',
                        autorename: false,
                        mute: false
                    }),
                    'Content-Type': 'application/octet-stream'
                },
                body: JSON.stringify(newData, null, 2)
            });

            if (response.ok) {
                statusMsg.innerText = "СИСТЕМУ ОНОВЛЕНО! Плеєр уже показує нове відео.";
                statusMsg.style.color = "#00ff41";
            } else {
                statusMsg.innerText = "Помилка Dropbox API. Зв'язок розірвано.";
                statusMsg.style.color = "red";
            }

        } catch (error) {
            statusMsg.innerText = "Помилка мережі при з'єднанні з Dropbox";
            statusMsg.style.color = "red";
        }
    }
</script>

</body>
  </html>
