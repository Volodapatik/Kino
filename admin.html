<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.W.A.T. Admin Panel</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff41; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .terminal { background-color: #050505; border: 2px solid #00ff41; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); padding: 30px; border-radius: 5px; width: 100%; max-width: 500px; }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 255, 65, 0.5); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; background-color: #111; border: 1px solid #00ff41; color: #00ff41; border-radius: 4px; box-sizing: border-box; font-family: inherit; font-size: 1rem; }
        input:focus, select:focus { outline: none; box-shadow: 0 0 10px rgba(0, 255, 65, 0.5); }
        button { width: 100%; padding: 15px; background-color: #00ff41; border: none; color: #000; font-weight: bold; font-size: 1.1rem; border-radius: 4px; cursor: pointer; text-transform: uppercase; transition: all 0.3s ease; font-family: inherit; margin-top: 10px; }
        button:hover { background-color: #003300; color: #00ff41; box-shadow: 0 0 15px #00ff41; }
        .status { margin-top: 20px; text-align: center; font-size: 0.95rem; min-height: 24px; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="terminal">
    <h1>S.W.A.T. Command Center</h1>
    
    <!-- БЛОК ВХОДУ -->
    <div id="login-block">
        <div class="form-group">
            <label for="admin-password">Пароль адміна:</label>
            <input type="password" id="admin-password" placeholder="Введіть код доступу..." onkeydown="if(event.key==='Enter') login()">
        </div>
        <button onclick="login()">Увійти в систему</button>
    </div>

    <!-- БЛОК КЕРУВАННЯ ПЛЕЄРОМ -->
    <div id="control-block" class="hidden">
        <div class="form-group">
            <label for="movie-title">Назва фільму / серії:</label>
            <input type="text" id="movie-title" placeholder="Наприклад: Хижак 2 (1990)">
        </div>
        <div class="form-group">
            <label for="movie-url">Посилання на відео (MP4 / M3U8):</label>
            <input type="text" id="movie-url" placeholder="https://...">
        </div>
        <div class="form-group">
            <label for="movie-status">Статус системи:</label>
            <select id="movie-status">
                <option value="ONLINE">ONLINE</option>
                <option value="OFFLINE">OFFLINE</option>
            </select>
        </div>
        <button onclick="updateDatabase()">Оновити плеєр</button>
    </div>

    <div class="status" id="status-msg">SYSTEM ACCESS REQUIRED</div>
</div>

<script>
    // Твій ОФІЦІЙНИЙ і ВІЧНИЙ токен, який я згенерував через API
    const REFRESH_TOKEN = "s0_qsQRpmLsAAAAAAAAAvZgY2I3TzFmX3pBeVVOTDh2Yw"; 
    const CLIENT_ID = "31ebl842bq4ci0v";
    const CLIENT_SECRET = "1agw2hgtzur90as";

    function login() {
        const password = document.getElementById('admin-password').value;
        const statusMsg = document.getElementById('status-msg');

        if (password === "1w2q789rs") {
            document.getElementById('login-block').classList.add('hidden');
            document.getElementById('control-block').classList.remove('hidden');
            statusMsg.innerText = "Доступ дозволено. З'єднання встановлено.";
            statusMsg.style.color = "#00ff41";
        } else {
            statusMsg.innerText = "ACCESS DENIED: Невірний пароль";
            statusMsg.style.color = "red";
        }
    }

    async function getAccessToken() {
        const response = await fetch('https://api.dropboxapi.com/oauth2/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                grant_type: 'refresh_token',
                refresh_token: REFRESH_TOKEN,
                client_id: CLIENT_ID,
                client_secret: CLIENT_SECRET
            })
        });
        const data = await response.json();
        if (!data.access_token) {
            throw new Error('Не вдалося отримати токен доступу');
        }
        return data.access_token;
    }

    async function updateDatabase() {
        const title = document.getElementById('movie-title').value;
        const url = document.getElementById('movie-url').value;
        const status = document.getElementById('movie-status').value;
        const statusMsg = document.getElementById('status-msg');

        if (!title || !url) {
            statusMsg.innerText = "Заповніть усі поля!";
            statusMsg.style.color = "red";
            return;
        }

        statusMsg.innerText = "Синхронізація з Dropbox...";
        statusMsg.style.color = "yellow";

        const newData = {
            "movies": [
                {
                    "id": 1,
                    "title": title,
                    "url": url,
                    "status": status
                }
            ]
        };

        try {
            const accessToken = await getAccessToken();

            const response = await fetch('https://content.dropboxapi.com/2/files/upload', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + accessToken,
                    'Dropbox-API-Arg': JSON.stringify({
                        path: '/db.json',
                        mode: 'overwrite',
                        autorename: false,
                        mute: false
                    }),
                    'Content-Type': 'application/octet-stream'
                },
                body: JSON.stringify(newData, null, 2)
            });

            if (response.ok) {
                statusMsg.innerText = "СИСТЕМУ ОНОВЛЕНО! Дані успішно залито в Dropbox.";
                statusMsg.style.color = "#00ff41";
            } else {
                statusMsg.innerText = "Помилка запису Dropbox API.";
                statusMsg.style.color = "red";
            }

        } catch (error) {
            statusMsg.innerText = "Помилка авторизації або мережі.";
            statusMsg.style.color = "red";
        }
    }
</script>
</body>
</html>
