<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.W.A.T. Admin Panel</title>
    <style>
        body { background-color: #0a0a0a; color: #00ff41; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .terminal { background-color: #050505; border: 2px solid #00ff41; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); padding: 30px; border-radius: 5px; width: 100%; max-width: 500px; }
        h1 { font-size: 1.5rem; text-align: center; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 255, 65, 0.5); }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; background-color: #111; border: 1px solid #00ff41; color: #00ff41; border-radius: 4px; box-sizing: border-box; font-family: inherit; font-size: 1rem; }
        button { width: 100%; padding: 15px; background-color: #00ff41; border: none; color: #000; font-weight: bold; font-size: 1.1rem; border-radius: 4px; cursor: pointer; text-transform: uppercase; margin-top: 10px; font-family: inherit; }
        button:hover { background-color: #003300; color: #00ff41; box-shadow: 0 0 15px #00ff41; }
        .status { margin-top: 20px; text-align: center; font-size: 0.95rem; min-height: 24px; font-weight: bold; }
        .hidden { display: none; }
        .bin-info { color: #888; font-size: 0.8rem; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="terminal">
    <h1>S.W.A.T. Command Center</h1>
    
    <div id="login-block">
        <div class="form-group">
            <label for="admin-password">Пароль адміна:</label>
            <input type="password" id="admin-password" placeholder="Введіть код..." onkeydown="if(event.key==='Enter') login()">
        </div>
        <button onclick="login()">Увійти</button>
    </div>

    <div id="control-block" class="hidden">
        <div class="form-group">
            <label for="movie-title">Назва фільму:</label>
            <input type="text" id="movie-title" placeholder="Наприклад: Хижак 2">
        </div>
        <div class="form-group">
            <label for="movie-url">Посилання (MP4 / M3U8):</label>
            <input type="text" id="movie-url" placeholder="https://...">
        </div>
        <div class="form-group">
            <label for="movie-status">Статус:</label>
            <select id="movie-status">
                <option value="ONLINE">ONLINE</option>
                <option value="OFFLINE">OFFLINE</option>
            </select>
        </div>
        <button onclick="updateDatabase()">Оновити плеєр</button>
        <div id="bin-display" class="bin-info">ID бази даних: 6a467a8cf5f4af5e295487eb</div>
    </div>

    <div class="status" id="status-msg">SYSTEM ACCESS REQUIRED</div>
</div>

<script>
    const API_KEY = "$2a$10$Rzw4Cc5jduJBprtKatMfVOrfDPERsie5r1jcQg3ZJ0hA3L09YtTHW";
    const FIXED_BIN_ID = "6a467a8cf5f4af5e295487eb";

    function login() {
        if (document.getElementById('admin-password').value === "1w2q789rs") {
            document.getElementById('login-block').classList.add('hidden');
            document.getElementById('control-block').classList.remove('hidden');
            document.getElementById('status-msg').innerText = "З'єднання встановлено.";
            document.getElementById('status-msg').style.color = "#00ff41";
        } else {
            document.getElementById('status-msg').innerText = "ACCESS DENIED";
            document.getElementById('status-msg').style.color = "red";
        }
    }

    async function updateDatabase() {
        const title = document.getElementById('movie-title').value;
        const url = document.getElementById('movie-url').value;
        const status = document.getElementById('movie-status').value;
        const statusMsg = document.getElementById('status-msg');

        if (!title || !url) { statusMsg.innerText = "Заповніть усі поля!"; statusMsg.style.color = "red"; return; }
        statusMsg.innerText = "Синхронізація з сервером..."; statusMsg.style.color = "yellow";

        const movieData = { "movies": [{ "id": 1, "title": title, "url": url, "status": status }] };

        try {
            const response = await fetch(`https://api.jsonbin.io/v3/b/${FIXED_BIN_ID}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': API_KEY
                },
                body: JSON.stringify(movieData)
            });

            if (response.ok) {
                statusMsg.innerText = "СИСТЕМУ ОНОВЛЕНО УСПІШНО!";
                statusMsg.style.color = "#00ff41";
            } else {
                statusMsg.innerText = "Помилка сервера. Спробуйте ще раз.";
                statusMsg.style.color = "red";
            }
        } catch (e) {
            statusMsg.innerText = "Помилка мережі.";
            statusMsg.style.color = "red";
        }
    }
</script>
</body>
</html>
