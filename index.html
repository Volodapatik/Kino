<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.W.A.T. Player — No Ads</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Consolas', monospace;
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 1100px;
            background: #111;
            padding: 5px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            border: 1px solid #222;
        }

        .header {
            color: #00ff41;
            text-align: center;
            font-size: 14px;
            padding: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        :root {
            --plyr-color-main: #00ff41;
            --plyr-video-background: #000;
        }

        .plyr {
            border-radius: 8px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="status-header" class="header">System Bypass: Loading DB...</div>
    
    <video id="player" playsinline controls></video>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
    const player = new Plyr('#player', {
        title: 'S.W.A.T.',
        tooltips: { controls: true, seek: true },
        keyboard: { focused: true, global: true },
        fullscreen: { enabled: true, fallback: true, iosNative: true }
    });

    // Твій публічний токен для ЧИТАННЯ (без пароля, суто щоб плеєр міг завантажити файл)
    // Dropbox дозволяє читати файли додатку, якщо знаємо шлях.
    // Але ми підемо простішим шляхом: адмінка збереже файл, а плеєр прочитає його через контент-лінк.
    async function initCinema() {
        try {
            // Завантажуємо файл, який згенерувала адмінка.
            // Замість локального db.json ми робимо запит на Dropbox контент.
            // Щоб отримати чисте пряме посилання, міняємо dl=0 на raw=1 у запиті до Dropbox App контенту.
            
            // Якщо ти назвав додаток в Dropbox інакше, папка в Apps буде мати інше ім'я.
            // Найпростіший варіант, який працює на 100% — це зчитати файл через пряме посилання контенту користувача.
            const response = await fetch('https://dl.dropboxusercontent.com/scl/fi/db_file_placeholder/db.json?rlkey=placeholder&raw=1&v=' + Math.random());
            
            // АЛЕ оскільки ми робимо це через API без генерації публічного лінку вручну, 
            // найкраще читати файл через тимчасовий токен або пряме сховище.
            // Нижче універсальний хакерський трюк: ми дістаємо файл прямо з репозиторію Dropbox додатка.
            
            // Для того, щоб не прописувати складні токени в плеєр, після першого збереження в адмінці
            // зайди в свій Dropbox, знайди файл db.json, натисни "Поділитися" (Share) -> "Копіювати посилання".
            // Встав це посилання сюди, замінивши в кінці "dl=0" на "raw=1".
            
            // ТИМЧАСОВЕ РІШЕННЯ ДЛЯ ТЕСТУ (заміни лінк нижче на свій share-лінк з Dropbox, коли адмінка створить файл):
            const dbUrl = 'https://dl.dropboxusercontent.com/s/apps/swat_cinema_bypass_/db.json?raw=1&v=' + Math.random();
            
            const res = await fetch(dbUrl);
            const data = await res.json();
            const movie = data.movies[0];

            document.getElementById('status-header').innerText = `System Bypass: ${movie.status} — ${movie.title}`;
            
            // Перевірка та конвертація посилання на відео (якщо це Dropbox-лінк)
            let videoUrl = movie.url;
            if (videoUrl.includes('dropbox.com') && videoUrl.includes('dl=0')) {
                videoUrl = videoUrl.replace('dl=0', 'raw=1');
            }

            player.source = {
                type: 'video',
                title: movie.title,
                sources: [
                    {
                        src: videoUrl,
                        type: 'video/mp4',
                    }
                ],
            };

            console.log("Плеєр отримав нове посилання:", videoUrl);

        } catch (error) {
            document.getElementById('status-header').innerText = "System Bypass: Database Error";
            document.getElementById('status-header').style.color = "red";
            console.error(error);
        }
    }

    initCinema();

    player.on('enterfullscreen', () => {
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
        }
    });

    player.on('exitfullscreen', () => {
        if (screen.orientation && screen.orientation.unlock) {
            screen.orientation.unlock();
        }
    });
</script>

</body>
</html>
