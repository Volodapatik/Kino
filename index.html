<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.W.A.T. Player</title>
    <!-- Підключаємо стилі та скрипти плеєра Clappr -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }
        #movie-title {
            margin-bottom: 15px;
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            text-shadow: 0 0 10px #00ff41;
            color: #00ff41;
        }
        #player-wrapper {
            width: 100%;
            max-width: 854px;
            aspect-ratio: 16/9;
            background-color: #111;
            border: 2px solid #00ff41;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.3);
        }
        #error-msg {
            color: #ff0000;
            font-size: 1.2rem;
            text-align: center;
            display: none;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="movie-title">Завантаження системи...</div>
    <div id="player-wrapper">
        <div id="player"></div>
        <div id="error-msg">СИСТЕМА OFFLINE АБО ПОМИЛКА ЗАВАНТАЖЕННЯ</div>
    </div>

<script>
    // Твій особистий ID бази даних, який ми щойно згенерували
    const BIN_ID = '6a4678b5da38895dfe22ec7d';
    const dbUrl = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest?meta=false`;

    async function initPlayer() {
        const titleEl = document.getElementById('movie-title');
        const errorEl = document.getElementById('error-msg');
        const playerEl = document.getElementById('player');

        try {
            // Отримуємо актуальні дані про фільм
            const response = await fetch(dbUrl);
            if (!response.ok) throw new Error('Помилка мережі');
            
            const data = await response.json();
            const movie = data.movies[0];

            // Перевіряємо статус системи
            if (movie.status === 'OFFLINE') {
                titleEl.innerText = "СИСТЕМА ОФЛАЙН";
                titleEl.style.color = "red";
                playerEl.style.display = 'none';
                errorEl.style.display = 'block';
                return;
            }

            // Виводимо назву фільму
            titleEl.innerText = movie.title;

            // Ініціалізуємо плеєр Clappr, який ідеально жує .m3u8 потоки
            const player = new Clappr.Player({
                source: movie.url,
                parentId: "#player",
                width: "100%",
                height: "100%",
                autoPlay: false,
                preload: 'auto',
                mimeType: 'application/x-mpegURL'
            });

        } catch (error) {
            console.error(error);
            titleEl.innerText = "ПОМИЛКА СИНХРОНІЗАЦІЇ";
            titleEl.style.color = "red";
            playerEl.style.display = 'none';
            errorEl.style.display = 'block';
        }
    }

    // Запуск при завантаженні сторінки
    window.onload = initPlayer;
</script>
</body>
</html>
