<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.W.A.T. Player — No Ads</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        body {
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Consolas', monospace;
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 1100px;
            background: #111;
            padding: 5px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            border: 1px solid #222;
        }

        .header {
            color: #00ff41;
            text-align: center;
            font-size: 14px;
            padding: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        :root {
            --plyr-color-main: #00ff41;
            --plyr-video-background: #000;
        }

        .plyr {
            border-radius: 8px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="status-header" class="header">System Bypass: Loading DB...</div>
    
    <video id="player" playsinline controls>
        <source id="video-source" src="" type="video/mp4" />
    </video>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
    // Ініціалізація плеєра
    const player = new Plyr('#player', {
        title: 'S.W.A.T.',
        tooltips: { controls: true, seek: true },
        keyboard: { focused: true, global: true },
        fullscreen: { enabled: true, fallback: true, iosNative: true }
    });

    // --- ФУНКЦІЯ ПІДКЛЮЧЕННЯ ДО БАЗИ ДАНИХ ---
    async function initCinema() {
        try {
            // Читаємо наш JSON файл
            const response = await fetch('db.json');
            const data = await response.json();
            
            // Беремо дані першого фільму
            const movie = data.movies[0];

            // Оновлюємо інтерфейс
            document.getElementById('status-header').innerText = `System Bypass: ${movie.status} — ${movie.title}`;
            
            // Встановлюємо посилання у плеєр
            const videoElement = document.getElementById('player');
            videoElement.src = movie.url;
            
            console.log("Дані з бази завантажено успішно!");
        } catch (error) {
            document.getElementById('status-header').innerText = "System Bypass: Database Error";
            document.getElementById('status-header').style.color = "red";
            console.error("Помилка при завантаженні db.json:", error);
        }
    }

    // Запускаємо при завантаженні сторінки
    initCinema();

    // Автоповорот екрана
    player.on('enterfullscreen', () => {
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(() => {});
        }
    });

    player.on('exitfullscreen', () => {
        if (screen.orientation && screen.orientation.unlock) {
            screen.orientation.unlock();
        }
    });
</script>

</body>
</html>
